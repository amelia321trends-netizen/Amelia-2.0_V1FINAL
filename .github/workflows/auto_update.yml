name: Actualización Automática Semanal de Tendencias RTA

on:
  schedule:
    # Se ejecuta todos los lunes a las 00:00 UTC (medianoche de domingo a lunes)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # Permite la ejecución manual desde la pestaña Actions de GitHub

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso necesario para realizar push de los cambios al repositorio

    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v3

      - name: Inicializar Entorno de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Ejecutar Script de Ingesta y Análisis RTA
        run: |
          python actualizador_rta.py

      - name: Commit y Push de Cambios Actualizados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.json README.md
          # Solo commitea si hay cambios reales en los archivos
          git diff-index --quiet HEAD || (git commit -m "Actualización automática semanal de Tendencias RTA" && git push)
